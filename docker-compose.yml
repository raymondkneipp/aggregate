services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aggregate
      POSTGRES_USER: aggregate
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aggregate"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
